<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>文件夹与合集切换交互 Demo</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{display:flex;justify-content:center;align-items:center;min-height:100vh;background:#f0f0f0;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif}
.phone{width:375px;height:780px;border:3px solid #1a1a1a;border-radius:44px;background:#fff;position:relative;overflow:hidden;box-shadow:0 20px 60px rgba(0,0,0,.25)}
.screen{display:flex;flex-direction:column;height:100%;overflow:hidden;background:#fff}
.status-bar{display:flex;justify-content:space-between;align-items:center;padding:12px 24px 4px;font-size:12px;font-weight:600;flex-shrink:0}
.status-bar .time{font-size:14px;font-weight:700}
.status-bar .icons{display:flex;gap:4px;align-items:center;font-size:11px}
.top-bar{display:flex;justify-content:space-between;align-items:center;padding:4px 16px 0;flex-shrink:0}
.top-bar svg{width:24px;height:24px;color:#333;cursor:pointer}
.page-title{font-size:28px;font-weight:700;padding:8px 16px 6px;flex-shrink:0}
.search-bar{margin:0 16px 8px;background:#f5f5f5;border-radius:10px;padding:8px 12px;display:flex;align-items:center;gap:8px;font-size:14px;color:#999;flex-shrink:0}
.search-bar svg{width:16px;height:16px;color:#999;flex-shrink:0}
.filter-bar{display:flex;align-items:center;padding:4px 16px 6px;gap:8px;flex-shrink:0;overflow:hidden}
.mode-btn{width:32px;height:32px;border-radius:8px;border:1.5px solid #FF6900;background:#FFF3E0;display:flex;align-items:center;justify-content:center;cursor:pointer;flex-shrink:0;transition:all .3s}
.mode-btn.collection-mode{border-color:#FF8F00;background:#FFF8E1}
.mode-btn svg{width:18px;height:18px}
.chips-wrapper{position:relative;flex:1;overflow:hidden;height:32px}
.chips-track{display:flex;gap:8px;position:absolute;top:0;left:0;height:100%;white-space:nowrap;transition:transform .35s cubic-bezier(.4,0,.2,1),opacity .3s}
.chips-track.hidden{opacity:0;pointer-events:none}
.chips-track.slide-out-left{transform:translateX(-30px);opacity:0}
.chips-track.slide-in-right{transform:translateX(30px);opacity:0}
.chip{padding:6px 14px;border-radius:16px;font-size:13px;background:#f5f5f5;color:#666;cursor:pointer;white-space:nowrap;transition:all .2s;line-height:1;display:flex;align-items:center}
.chip.active{background:#FF6900;color:#fff}
.filter-bar.collection-mode .chip.active{background:#FF8F00;color:#fff}
.view-tag{padding:2px 16px 8px;flex-shrink:0}
.view-tag span{display:inline-block;font-size:11px;padding:3px 8px;border-radius:4px;background:#FFF3E0;color:#E65100}
.view-tag span.collection-tag{background:#FFF8E1;color:#E65100}
.note-list{flex:1;overflow-y:auto;padding:0 16px 8px;transition:opacity .25s}
.note-list.hidden{display:none}
.note-card{display:flex;gap:10px;padding:12px;border-radius:12px;border:1px solid #eee;margin-bottom:8px;cursor:pointer;transition:box-shadow .2s}
.note-card:hover{box-shadow:0 2px 8px rgba(0,0,0,.06)}
.note-thumb{width:44px;height:44px;border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:20px;flex-shrink:0;background:#f5f5f5}
.note-body{flex:1;min-width:0}
.note-title-row{display:flex;align-items:center;gap:6px;margin-bottom:3px}
.note-title{font-size:14px;font-weight:600;color:#1a1a1a;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.note-pin{font-size:12px;color:#FF6900}
.ai-badge{font-size:9px;padding:1px 5px;border-radius:3px;background:linear-gradient(135deg,#a78bfa,#f472b6,#fb923c);color:#fff;font-weight:600;flex-shrink:0;line-height:1.4}
.note-desc{font-size:12px;color:#999;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.note-meta{font-size:11px;color:#bbb;margin-top:3px}
</style>
</head>
<body>
<div class="phone">
<div class="screen">
<div class="status-bar"><span class="time">9:41</span><div class="icons"><span>5G</span><svg viewBox="0 0 24 24" width="14" height="14" fill="currentColor"><path d="M1 9l2 2c4.97-4.97 13.03-4.97 18 0l2-2C16.93 2.93 7.08 2.93 1 9zm8 8l3 3 3-3a4.24 4.24 0 00-6 0zm-4-4l2 2a7.07 7.07 0 0110 0l2-2C15.14 9.14 8.87 9.14 5 13z"/></svg><svg viewBox="0 0 24 24" width="14" height="14" fill="currentColor"><path d="M15.67 4H14V2h-4v2H8.33C7.6 4 7 4.6 7 5.33v15.33C7 21.4 7.6 22 8.33 22h7.33c.74 0 1.34-.6 1.34-1.33V5.33C17 4.6 16.4 4 15.67 4z"/></svg></div></div>
<div class="top-bar">
<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="7" height="7" rx="1"/><rect x="14" y="3" width="7" height="7" rx="1"/><rect x="3" y="14" width="7" height="7" rx="1"/><rect x="14" y="14" width="7" height="7" rx="1"/></svg>
<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="5" r="1.5"/><circle cx="12" cy="12" r="1.5"/><circle cx="12" cy="19" r="1.5"/></svg>
</div>
<div class="page-title">笔记</div>
<div class="search-bar"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><path d="M21 21l-4.35-4.35"/></svg><span>搜索笔记</span></div>
<div class="filter-bar" id="filterBar">
<div class="mode-btn" id="modeBtn" onclick="openPanel()"><svg id="modeBtnIcon" viewBox="0 0 24 24" fill="none" stroke="#FF6900" stroke-width="2"><path d="M3 7v10a2 2 0 002 2h14a2 2 0 002-2V9a2 2 0 00-2-2h-6l-2-2H5a2 2 0 00-2 2z"/></svg></div>
<div class="chips-wrapper">
<div class="chips-track" id="folderChips">
<div class="chip active" onclick="selectChip('folder',0)">全部</div>
<div class="chip" onclick="selectChip('folder',1)">会议纪要</div>
<div class="chip" onclick="selectChip('folder',2)">工作</div>
<div class="chip" onclick="selectChip('folder',3)">读后感</div>
<div class="chip" onclick="selectChip('folder',4)">生活点滴</div>
</div>
<div class="chips-track hidden" id="collectionChips">
<div class="chip active" onclick="selectChip('collection',0)">全部</div>
<div class="chip" onclick="selectChip('collection',1)">会议纪要</div>
<div class="chip" onclick="selectChip('collection',2)">通话摘要</div>
<div class="chip" onclick="selectChip('collection',3)">每日简报</div>
<div class="chip" onclick="selectChip('collection',4)">Q2 规划</div>
</div>
</div>
</div>
<div class="view-tag"><span id="viewTag">文件夹视图</span></div>
